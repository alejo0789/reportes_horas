<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cumplimiento Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #fff;
            color: #333;
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            background-color: #35B595; /* Header green */
            color: white;
            padding: 8px 15px;
            font-weight: bold;
            font-size: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-top: 2px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 5px 8px;
        }
        th {
            background-color: #0F3A66; /* Header dark blue */
            color: white;
            font-weight: bold;
            text-align: center;
        }
        
        /* Hierarchy backgrounds */
        .g3-col, .prod-col, .g1-col {
            background-color: #6A6E71;
            color: white;
            font-weight: bold;
        }
        .prod-col {
            background-color: #797C7F;
        }
        .g1-col {
            background-color: #8C8F92;
        }
        
        .val-col {
            text-align: right;
            background-color: white;
        }
        
        .percent-box {
            display: inline-block;
            padding: 2px 5px;
            color: white;
            border-radius: 2px;
            width: 50px;
            text-align: center;
        }
        .bg-red { background-color: #C33B3F; }
        .bg-green { background-color: #26A844; }
        .text-red { color: #C33B3F; }
        
        .expander {
            cursor: pointer;
            margin-right: 5px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <div>Cumplimiento de Metas dia <span id="report-date" style="color: yellow; margin-left:10px;">Cargando...</span></div>
        <div>Zona:</div>
        <div>Promotor:</div>
    </div>
    
    <table id="compliance-table">
        <thead>
            <tr>
                <th>Grupo 3 Prod<br>(grupos)</th>
                <th>Producto</th>
                <th>Grupo 1 Prod</th>
                <th>Presupuesto dia</th>
                <th>Ejecutado dia</th>
                <th>% Cump<br>dia</th>
                <th>Dif Cump dia</th>
                <th>Dif Acum</th>
                <th>% Cump<br>acum</th>
                <th>Presupuesto dia<br>actual</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="10" align="center">Cargando datos...</td></tr>
        </tbody>
    </table>

    <script src="compliance.js"></script>
</body>
</html>
