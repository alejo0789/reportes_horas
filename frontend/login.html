<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso — Dashboard de Operaciones</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --brand-blue: #1257d1;
            --brand-blue-deep: #0a2e73;
            --brand-yellow: #ffc400;
            --text-primary: #0f2540;
            --text-secondary: #52627a;
            --danger: #ef4444;
            --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(1200px 600px at 20% -10%, #dbe7ff 0%, #eef2fa 45%, #e7ecf6 100%);
            color: var(--text-primary);
            padding: 24px;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(15, 37, 64, 0.10);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(13, 38, 89, 0.18);
            padding: 40px 34px;
        }
        .login-logos {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
            padding: 16px 22px;
            background: linear-gradient(135deg, #0a2e73, #0f2540);
            border-radius: 14px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 6px 18px rgba(10, 46, 115, 0.25);
        }
        .login-logos img { height: 34px; object-fit: contain; }
        .login-logos .divider { width: 1px; height: 26px; background: rgba(255, 255, 255, 0.25); }
        h1 { font-size: 1.35rem; font-weight: 700; text-align: center; margin-bottom: 4px; }
        .subtitle { text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 28px; }
        .field { margin-bottom: 18px; }
        .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 7px; }
        .input-wrap { position: relative; }
        .input-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border: 1px solid rgba(15, 37, 64, 0.15);
            border-radius: 12px;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.9);
            transition: border-color .15s, box-shadow .15s;
        }
        input:focus { outline: none; border-color: var(--brand-blue); box-shadow: 0 0 0 3px rgba(18, 87, 209, 0.15); }
        .btn-login {
            width: 100%;
            margin-top: 8px;
            padding: 13px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-blue-deep));
            color: #fff;
            font-family: var(--font-sans);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            transition: transform .12s, box-shadow .12s, opacity .12s;
        }
        .btn-login:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(18, 87, 209, 0.35); }
        .btn-login:disabled { opacity: .65; cursor: not-allowed; }
        .error-msg {
            display: none;
            margin-top: 16px;
            padding: 11px 14px;
            border-radius: 10px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: var(--danger);
            font-size: 0.85rem;
            text-align: center;
        }
        .error-msg.show { display: block; }
    </style>
</head>
<body>
    <form class="login-card" id="login-form" autocomplete="off">
        <div class="login-logos">
            <img src="assets/logos/acertemos.png" alt="Acertemos">
            <span class="divider"></span>
            <img src="assets/logos/sured.png" alt="SU RED">
            <span class="divider"></span>
            <img src="assets/logos/negativo.png" alt="Logo">
        </div>
        <h1>Bienvenido</h1>
        <p class="subtitle">Ingresa tus credenciales para acceder</p>

        <div class="field">
            <label for="email">Usuario</label>
            <div class="input-wrap">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="email" name="email" placeholder="Usuario" required autofocus
                       autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">
            </div>
        </div>

        <div class="field">
            <label for="password">Contraseña</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="••••••••" required
                       autocomplete="new-password">
            </div>
        </div>

        <button type="submit" class="btn-login" id="btn-login">
            <i class="fa-solid fa-right-to-bracket"></i> Ingresar
        </button>

        <div class="error-msg" id="error-msg"></div>
    </form>

    <script>
        // Si ya hay sesión activa, saltar directo al dashboard.
        if (sessionStorage.getItem('logged_in') === '1') {
            window.location.replace('index.html');
        }

        const form = document.getElementById('login-form');
        const btn = document.getElementById('btn-login');
        const errorBox = document.getElementById('error-msg');

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.classList.add('show');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.classList.remove('show');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Ingresando...';

            const body = new URLSearchParams();
            body.append('email', document.getElementById('email').value.trim());
            body.append('password', document.getElementById('password').value);

            try {
                const res = await fetch('api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body
                });

                if (!res.ok) {
                    let detail = 'No se pudo iniciar sesión.';
                    try { detail = (await res.json()).detail || detail; } catch (_) {}
                    showError(detail);
                    return;
                }

                sessionStorage.setItem('logged_in', '1');
                window.location.replace('index.html');
            } catch (err) {
                showError('Error de conexión con el servidor. Inténtalo de nuevo.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Ingresar';
            }
        });
    </script>
</body>
</html>
